version: '3.8'

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: crypto-trading-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_WS_URL=ws://localhost:8000
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: crypto-trading-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://trader:traderpassword@postgres:5432/crypto_trading
      - REDIS_URL=redis://redis:6379/0
      - OKX_API_KEY=${OKX_API_KEY:-}
      - OKX_SECRET_KEY=${OKX_SECRET_KEY:-}
      - OKX_PASSPHRASE=${OKX_PASSPHRASE:-}
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:15-alpine
    container_name: crypto-trading-postgres
    environment:
      - POSTGRES_USER=trader
      - POSTGRES_PASSWORD=traderpassword
      - POSTGRES_DB=crypto_trading
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trader -d crypto_trading"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: crypto-trading-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
